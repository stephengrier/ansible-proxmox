- name: Configure a Proxmox node
  hosts: all
  gather_facts: no

  roles:
    - role: proxmox_template
      vars:
        proxmox_api_host: '{{ api_host }}'
        proxmox_api_user: '{{ api_user }}'
        proxmox_api_token_id: '{{ api_token_id }}'
        proxmox_api_token_secret: '{{ api_token_secret }}'
        proxmox_node: "proxmox1"
        proxmox_ciuser: 'steveg'

        proxmox_templates:

          - vmid: 900
            name: tmpl-debian-13
            url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2
            filename: debian-13-genericcloud-amd64.qcow2

          - vmid: 910
            name: tmpl-ubuntu-24-04
            url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img
            filename: ubuntu-24.04-server-cloudimg-amd64.img

          - vmid: 920
            name: tmpl-fedora-43
            url: https://mirror.accum.se/mirror/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2
            filename: Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2

          - vmid: 940
            name: tmpl-alpine-3.23
            url: https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/generic_alpine-3.23.3-x86_64-bios-cloudinit-r0.qcow2
            filename: generic_alpine-3.23.3-x86_64-bios-cloudinit-r0.qcow2

          - vmid: 960
            name: tmpl-freebsd-14-3
            url: https://download.freebsd.org/releases/VM-IMAGES/14.3-RELEASE/amd64/Latest/FreeBSD-14.3-RELEASE-amd64-BASIC-CLOUDINIT-ufs.qcow2.xz
            filename: FreeBSD-14.3-RELEASE-amd64-BASIC-CLOUDINIT-ufs.qcow2.xz
